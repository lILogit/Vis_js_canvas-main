<svg width="800" height="1100" viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      .text-title { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 28px; fill: #1e293b; }
      .text-subtitle { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 20px; fill: #334155; }
      .text-body { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 14px; fill: #475569; }
      .text-small { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 12px; fill: #64748b; }
      .text-white { fill: #ffffff; }
      .text-error { fill: #ef4444; }
      .bg-rect { fill: #f8fafc; rx: 8; stroke: #e2e8f0; stroke-width: 1; }
    </style>
    
    <!-- Arrow Markers -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="1100" fill="#ffffff" />

  <!-- Header -->
  <text x="40" y="50" class="text-title">RCDE Structural Spine Rules</text>
  <text x="40" y="80" class="text-body">A visual blueprint for linear causal logic and epistemic honesty.</text>

  <!-- SECTION 1: THE SPINE (Layers) -->
  <g transform="translate(40, 120)">
    <text x="0" y="0" class="text-subtitle">1. The Structural Spine</text>
    
    <!-- The Flow Line -->
    <line x1="50" y1="60" x2="680" y2="60" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round" />
    
    <!-- Layer R -->
    <g transform="translate(20, 30)">
      <rect width="140" height="140" rx="12" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2" />
      <text x="70" y="30" text-anchor="middle" class="text-subtitle" fill="#1e40af" style="fill:#1e40af">R (Root)</text>
      <text x="70" y="55" text-anchor="middle" class="text-small" fill="#1e40af" style="fill:#1e40af; font-weight:600">ENTRY POINT</text>
      <line x1="20" y1="70" x2="120" y2="70" stroke="#3b82f6" stroke-width="1" />
      <text x="70" y="90" text-anchor="middle" class="text-small">• Root Cause</text>
      <text x="70" y="110" text-anchor="middle" class="text-small">• Evidence</text>
      <text x="70" y="130" text-anchor="middle" class="text-small" style="font-style:italic">Edges: OUT only</text>
    </g>

    <!-- Arrow R->C -->
    <path d="M 160 100 L 190 100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)" />

    <!-- Layer C -->
    <g transform="translate(200, 30)">
      <rect width="140" height="140" rx="12" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="2" />
      <text x="70" y="30" text-anchor="middle" class="text-subtitle" fill="#5b21b6" style="fill:#5b21b6">C (Pathway)</text>
      <text x="70" y="55" text-anchor="middle" class="text-small" fill="#5b21b6" style="fill:#5b21b6; font-weight:600">THE ENGINE</text>
      <line x1="20" y1="70" x2="120" y2="70" stroke="#8b5cf6" stroke-width="1" />
      <text x="70" y="90" text-anchor="middle" class="text-small">• Mechanism</text>
      <text x="70" y="110" text-anchor="middle" class="text-small">• Moderator</text>
      <text x="70" y="130" text-anchor="middle" class="text-small" style="font-style:italic">Explains How</text>
    </g>

    <!-- Arrow C->D -->
    <path d="M 340 100 L 370 100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)" />

    <!-- Layer D -->
    <g transform="translate(380, 30)">
      <rect width="140" height="140" rx="12" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="2" />
      <text x="70" y="30" text-anchor="middle" class="text-subtitle" fill="#92400e" style="fill:#92400e">D (Decision)</text>
      <text x="70" y="55" text-anchor="middle" class="text-small" fill="#92400e" style="fill:#92400e; font-weight:600">INTERVENTION</text>
      <line x1="20" y1="70" x2="120" y2="70" stroke="#f59e0b" stroke-width="1" />
      <text x="70" y="90" text-anchor="middle" class="text-small">• Tasks</text>
      <text x="70" y="110" text-anchor="middle" class="text-small">• Questions</text>
      <text x="70" y="130" text-anchor="middle" class="text-small">• Gates</text>
    </g>

    <!-- Arrow D->E -->
    <path d="M 520 100 L 550 100" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)" />

    <!-- Layer E -->
    <g transform="translate(560, 30)">
      <rect width="140" height="140" rx="12" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="2" />
      <text x="70" y="30" text-anchor="middle" class="text-subtitle" fill="#065f46" style="fill:#065f46">E (Effect)</text>
      <text x="70" y="55" text-anchor="middle" class="text-small" fill="#065f46" style="fill:#065f46; font-weight:600">TERMINAL</text>
      <line x1="20" y1="70" x2="120" y2="70" stroke="#10b981" stroke-width="1" />
      <text x="70" y="90" text-anchor="middle" class="text-small">• Goal</text>
      <text x="70" y="110" text-anchor="middle" class="text-small">• Effect</text>
      <text x="70" y="130" text-anchor="middle" class="text-small" style="font-style:italic">End Point</text>
    </g>
    
    <text x="360" y="200" text-anchor="middle" class="text-small" fill="#64748b">Linear Flow: $R \to C \to D \to E$ prevents spaghetti logic</text>
  </g>

  <!-- SECTION 2: SYNTACTIC GRAMMAR -->
  <g transform="translate(40, 360)">
    <text x="0" y="0" class="text-subtitle">2. Syntactic Grammar</text>
    
    <!-- Logic Block -->
    <rect x="0" y="20" width="720" height="130" class="bg-rect" />
    
    <!-- Node Types -->
    <g transform="translate(20, 40)">
      <text x="0" y="0" class="text-small" font-weight="600" fill="#475569">Node-Type Logic (G1 &amp; G3)</text>
      
      <!-- Blackbox -->
      <rect x="0" y="20" width="140" height="60" rx="4" fill="#e2e8f0" stroke="#94a3b8" />
      <text x="70" y="40" text-anchor="middle" class="text-small" font-weight="600">Blackbox</text>
      <text x="70" y="55" text-anchor="middle" class="text-small" font-size="10">Function: Mechanism ONLY</text>
      <text x="70" y="70" text-anchor="middle" class="text-small" font-size="10" fill="#ef4444">Cannot be Root</text>

      <!-- Concept -->
      <rect x="160" y="20" width="140" height="60" rx="4" fill="#e2e8f0" stroke="#94a3b8" />
      <text x="230" y="40" text-anchor="middle" class="text-small" font-weight="600">Concept</text>
      <text x="230" y="55" text-anchor="middle" class="text-small" font-size="10">Evidence / Moderator</text>
      <text x="230" y="70" text-anchor="middle" class="text-small" font-size="10">Lateral framing</text>

      <!-- Goal -->
      <rect x="320" y="20" width="140" height="60" rx="4" fill="#e2e8f0" stroke="#94a3b8" />
      <text x="390" y="40" text-anchor="middle" class="text-small" font-weight="600">Goal</text>
      <text x="390" y="55" text-anchor="middle" class="text-small" font-size="10">Terminal Anchor</text>
      <text x="390" y="70" text-anchor="middle" class="text-small" font-size="10">E Layer ONLY</text>
    </g>

    <!-- Edge Verbs -->
    <g transform="translate(500, 40)">
       <text x="0" y="0" class="text-small" font-weight="600" fill="#475569">Edge-Verb Direction (G4 &amp; G6)</text>
       
       <!-- Legal -->
       <path d="M 0 40 L 80 40" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowhead-blue)" />
       <text x="40" y="30" text-anchor="middle" class="text-small" fill="#3b82f6">R $\to$ E</text>
       
       <!-- Illegal -->
       <path d="M 0 80 L 80 80" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead-red)" />
       <line x1="10" y1="70" x2="70" y2="90" stroke="#ef4444" stroke-width="2" />
       <text x="40" y="70" text-anchor="middle" class="text-small" fill="#ef4444">E $\to$ C (Illegal)</text>

       <!-- Specific Verbs -->
       <text x="120" y="45" class="text-small" font-size="11">INSTANTIATES (Task $\to$ Goal)</text>
       <text x="120" y="65" class="text-small" font-size="11">PRECONDITION_OF (State $\to$ Goal)</text>
    </g>
  </g>

  <!-- SECTION 3: CALIBRATION & CONFIDENCE -->
  <g transform="translate(40, 520)">
    <text x="0" y="0" class="text-subtitle">3. Calibration &amp; Confidence (G8)</text>
    
    <rect x="0" y="20" width="340" height="180" class="bg-rect" />
    <rect x="380" y="20" width="340" height="180" class="bg-rect" />

    <!-- Left Col: Weakest Link -->
    <g transform="translate(20, 40)">
        <text x="0" y="0" class="text-body" font-weight="600">Weakest Link Logic</text>
        <text x="0" y="20" class="text-small">Confidence = Reliability of the gap.</text>
        
        <g transform="translate(0, 40)">
            <path d="M 0 10 L 30 10 L 30 15 L 60 15 L 60 10 L 90 10 L 90 15 L 120 15 L 120 10 L 150 10" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>
            <rect x="55" y="5" width="10" height="20" fill="#ef4444" />
            <text x="75" y="40" class="text-small" font-size="10">One thin link lowers ceiling</text>
        </g>
        <text x="0" y="100" class="text-small" font-size="11">• Unresolved Question = 0 Confidence</text>
        <text x="0" y="120" class="text-small" font-size="11">• Moderator AMPLIFIES/REDUCES weight</text>
    </g>

    <!-- Right Col: Gate & Task Logic -->
    <g transform="translate(400, 40)">
        <text x="0" y="0" class="text-body" font-weight="600">Gate &amp; Task Logic</text>
        
        <!-- Gate Visual -->
        <g transform="translate(0, 30)">
            <rect x="30" y="10" width="40" height="30" fill="#f59e0b" rx="4" />
            <text x="50" y="30" text-anchor="middle" font-size="10" fill="white" font-weight="bold">GATE</text>
            
            <path d="M 70 25 L 100 10" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
            <path d="M 70 25 L 100 40" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
            
            <text x="105" y="12" font-size="10">0.6</text>
            <text x="105" y="42" font-size="10">0.4</text>
            
            <text x="0" y="55" class="text-small" font-size="11">Outgoing edges must sum to 1.0</text>
        </g>

        <!-- Task Visual -->
        <g transform="translate(0, 100)">
             <rect x="0" y="0" width="60" height="30" fill="#f59e0b" rx="4" fill-opacity="0.2" stroke="#f59e0b" />
             <text x="30" y="20" text-anchor="middle" font-size="10" fill="#92400e">TASK</text>
             
             <path d="M 60 15 L 90 15" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)" />
             <text x="95" y="20" font-size="10" font-weight="600">REQUIRES Asset</text>
             
             <text x="0" y="45" class="text-small" font-size="11">Must link to budget/person/tool</text>
        </g>
    </g>
  </g>

  <!-- SECTION 4: DESIGN HARD LIMITS -->
  <g transform="translate(40, 740)">
    <text x="0" y="0" class="text-subtitle">4. Design Hard Limits</text>
    
    <!-- Limit 1 -->
    <g transform="translate(0, 20)">
        <rect width="230" height="80" rx="8" fill="#fee2e2" stroke="#fca5a5" />
        <text x="115" y="25" text-anchor="middle" class="text-body" font-weight="700" fill="#991b1b">Node Limit</text>
        <text x="115" y="45" text-anchor="middle" class="text-small" fill="#991b1b">&lt; 7 nodes per layer</text>
        <text x="115" y="60" text-anchor="middle" class="text-small" fill="#991b1b">&lt; 40 nodes total</text>
    </g>

    <!-- Limit 2 -->
    <g transform="translate(250, 20)">
        <rect width="230" height="80" rx="8" fill="#fee2e2" stroke="#fca5a5" />
        <text x="115" y="25" text-anchor="middle" class="text-body" font-weight="700" fill="#991b1b">Logic Limit</text>
        <text x="115" y="45" text-anchor="middle" class="text-small" fill="#991b1b">No Backward Arcs</text>
        <text x="115" y="60" text-anchor="middle" class="text-small" fill="#991b1b">Use Time Snapshots for loops</text>
    </g>
    
    <!-- Limit 3 -->
    <g transform="translate(500, 20)">
        <rect width="220" height="80" rx="8" fill="#fee2e2" stroke="#fca5a5" />
        <text x="110" y="25" text-anchor="middle" class="text-body" font-weight="700" fill="#991b1b">Gate Constraint</text>
        <text x="110" y="45" text-anchor="middle" class="text-small" fill="#991b1b">Scores must sum to 1.0</text>
        <text x="110" y="60" text-anchor="middle" class="text-small" fill="#991b1b">Exact probabilities</text>
    </g>
  </g>

  <!-- SECTION 5: WORKFLOW SUMMARY -->
  <g transform="translate(40, 860)">
    <text x="0" y="0" class="text-subtitle">5. Workflow Summary</text>
    <rect x="0" y="15" width="720" height="180" fill="#f1f5f9" rx="8" />
    
    <g transform="translate(30, 40)">
        <!-- Step 1 -->
        <g>
            <circle cx="20" cy="20" r="20" fill="#3b82f6" />
            <text x="20" y="25" text-anchor="middle" fill="white" font-weight="bold">1</text>
            <text x="50" y="15" class="text-body" font-weight="600">Build the Spine</text>
            <text x="50" y="35" class="text-small">Identify $R \to C \to D \to E$ path first.</text>
        </g>
        
        <!-- Arrow -->
        <path d="M 250 20 L 280 20" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />

        <!-- Step 2 -->
        <g transform="translate(290, 0)">
            <circle cx="20" cy="20" r="20" fill="#8b5cf6" />
            <text x="20" y="25" text-anchor="middle" fill="white" font-weight="bold">2</text>
            <text x="50" y="15" class="text-body" font-weight="600">Assign Archetypes</text>
            <text x="50" y="35" class="text-small">Ensure role is valid for the layer.</text>
        </g>
        
        <!-- Arrow -->
        <path d="M 540 20 L 570 20" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)" />
        
        <!-- Step 3 -->
        <g transform="translate(580, 0)">
             <circle cx="20" cy="20" r="20" fill="#f59e0b" />
            <text x="20" y="25" text-anchor="middle" fill="white" font-weight="bold">3</text>
            <text x="50" y="15" class="text-body" font-weight="600">Audit Verbs</text>
            <text x="50" y="35" class="text-small">Check edge types (CAUSES vs ENABLES).</text>
        </g>
    </g>
    
    <g transform="translate(30, 100)">
        <!-- Step 4 -->
        <g>
            <circle cx="20" cy="20" r="20" fill="#10b981" />
            <text x="20" y="25" text-anchor="middle" fill="white" font-weight="bold">4</text>
            <text x="50" y="15" class="text-body" font-weight="600">Compress</text>
            <text x="50" y="35" class="text-small">If &gt; 40 nodes, merge linear sequences into composites.</text>
        </g>
    </g>
  </g>

</svg>