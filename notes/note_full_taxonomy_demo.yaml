This note is a full-chain synthesis intended to make every node type and edge relation explicit
in a single coherent narrative. Use it as a reference when testing the ingestion pipeline.

NODE TYPES IN THIS CHAIN:
- STATE: "acute cortisol reduction" and "sustained focus window" are conditions that persist until
  disrupted. "Working memory impairment" is the risk-state the chain aims to prevent.
- EVENT: "cold swim" is a discrete occurrence that triggers downstream transitions.
- TASK: "4-week cold swim trial" is a deliberate event triggered by the agent with intent to
  produce specific downstream states. It fires only when its asset requirements are met.
- ASSET: "L-tyrosine + ashwagandha stack" is a resource consumed by the pharmacological task
  branch. It connects to its task via REQUIRES, not via a causal edge.
- GATE: "intervention strategy gate" is a formally scored fork with mutually exclusive branches.
  It carries explicit criteria (cost, time, sustainability) and diverges to each branch.
- GOAL: the desired terminal state — 90-minute cognitive peak above baseline — is the single
  anchor the whole chain works toward. Every other node is a precondition of or risk to it.
- CONCEPT: attentional resource theory frames how the norepinephrine spike produces focus by
  modulating executive bandwidth. It shapes interpretation of multiple nodes without being causal.
- QUESTION: whether the focus window extends reliably past 90 minutes blocks the goal from being
  confirmed achievable. It must be resolved before the gate closes permanently.
- DECISION: adopting biometric measurement is a deliberate choice that requires specific assets
  and resolves the open question by generating evidence.
- BLACKBOX: HPA axis individual calibration variance is the opaque mechanism causing day-to-day
  noise in the cortisol reduction magnitude. Internal process unknown; flagged for review.

